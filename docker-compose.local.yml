# Локальная проверка prod-сборки
# Запуск: docker compose -f docker-compose.local.yml up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        - API_URL=${API_URL}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
